<!DOCTYPE html>
<html lang="en">
<head>
    <title>PokèVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>

</head>

<body>
<div class="top">
    <div class="top-left">
            <img id="sound_on" src="images/sound_on.png">
            <img id="sound_off" src="images/sound_off.png">
            <img id="sound_on_invert" src="images/sound_on_invert.png">
            <img id="sound_off_invert" src="images/sound_off_invert.png">
    </div>

    <div class="title">PokèVault</div>
    <audio id="bgm" src="sounds/background.mp3" loop></audio>

     <div class="top-right">
            <img id="poke_ball" src="images/poke_ball_(light).png">
            <img id="ultra_ball" src="images/ultra_ball_(dark).png">
    </div>
</div>

<div class="badan-tengah">
<img id="left-arrow" src="images/left_arrow.png">
    <div class="content">
        <h2 id="pokemon-name"></h2>

<div class="pokemon-info">
    <div class="info-lagi">
        <p id="type"></p>
        <p id="height"></p>
        <p id="weight"></p>
        <p id="abilities"></p>
        <p id="weakness"></p>
    </div>
<img id="pokemon-img" src="images/bulbasaur_.png">
</div>
</div>
    <img id="right-arrow" src="images/right_arrow.png">
</div>

</body>
</html>
